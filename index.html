<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>階層ToDo・時間記録アプリ (クラウド同期版)</title>
  <style>
    :root {
      --bg: #f6f7fb; --panel: #ffffff; --line: #d9deea; --text: #1f2937;
      --sub: #6b7280; --accent: #2563eb; --accent-soft: #dbeafe;
      --danger: #dc2626; --ok: #15803d; --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px; --indent: 18px; --hour-height: 28px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg); }
    button, input, textarea { font: inherit; }

    .app { max-width: 1720px; margin: 0 auto; padding: 12px; }

    /* ヘッダーと認証UI */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header-text h1 { margin: 0; font-size: 1.35rem; }
    
    .auth-container { display: flex; align-items: center; gap: 10px; background: #fff; padding: 8px 14px; border-radius: 999px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .user-info { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: #334155; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .btn-login { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 999px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-login:hover { background: #1d4ed8; }
    .btn-logout { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; cursor: pointer; }

    #main-app { transition: opacity 0.3s; }
    #main-app.hidden { opacity: 0; pointer-events: none; display: none; }

    /* メインナビゲーション */
    .main-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--line); }
    .main-nav-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; font-size: 1rem; font-weight: bold; color: var(--sub); margin-bottom: -2px; border-bottom: 2px solid transparent; transition: 0.2s; }
    .main-nav-btn:hover { color: var(--accent); }
    .main-nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    
    .view-section { display: none; animation: fadeIn 0.2s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* パネルとタブデザイン */
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 0 var(--radius) var(--radius) var(--radius); box-shadow: var(--shadow); }
    .tabs-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: flex-end; margin-bottom: -1px; position: relative; z-index: 10; }
    .tab-btn, .tab-action-btn, .task-create button, .small-btn, .icon-btn, .detail-btn {
      border: 1px solid var(--line); background: #fff; cursor: pointer; transition: 0.15s ease; white-space: nowrap;
    }
    .tab-btn { padding: 10px 18px; border-radius: 12px 12px 0 0; font-weight: 700; background: #f8fafc; border-bottom: 1px solid var(--line); display: inline-flex; align-items: center; gap: 7px; color: var(--sub); }
    .tab-btn.active { background: var(--panel); border-color: var(--line); border-bottom-color: var(--panel); color: var(--text); padding-bottom: 11px; }
    .tab-dot { width: 11px; height: 11px; border-radius: 999px; display: inline-block; flex: 0 0 auto; }
    .tab-actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 5px; }
    .tab-action-btn { border-radius: 8px; padding: 6px 10px; font-size: 0.85rem; }
    .tab-action-btn:hover, .task-create button:hover, .icon-btn:hover, .detail-btn:hover, .small-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05); }

    .panel-header { padding: 14px 16px; border-bottom: 1px solid #eef2f7; display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .panel-header input[type="date"] { border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; font-family: inherit; }
    .panel-header button { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-weight: bold; }
    .panel-body { padding: 16px; }

    .task-create { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 16px; }
    .task-create input, .detail-textarea, .detail-task-name { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: #fff; width: 100%; }
    .task-create button { border-radius: 10px; font-weight: bold; }

    /* タスク行のレイアウト */
    .task-list { min-height: 120px; }
    .task-block { position: relative; }
    .drop-gap { height: 7px; margin: 1px 0; position: relative; border-radius: 999px; margin-left: calc(var(--depth) * var(--indent)); }
    .drop-gap::after { content: ""; position: absolute; left: 6px; right: 6px; top: 50%; border-top: 2px dashed transparent; transform: translateY(-50%); transition: 0.16s ease; }
    .drop-gap.active::after { border-top-color: var(--accent); }

    /* PCレイアウト：1行にまとめる */
    .task-row {
      display: grid; 
      grid-template-columns: 24px 1fr auto auto auto auto;
      grid-template-areas: "collapse name meta color detail delete";
      gap: 5px 8px; align-items: center; min-height: 44px; padding: 10px 12px;
      margin-left: calc(var(--depth) * var(--indent)); border: 2px solid transparent; outline: 1px solid #e8edf5;
      border-radius: 12px; background: #fff; position: relative; transition: 0.16s ease; cursor: pointer;
    }
    .task-row:hover { outline-color: #cbd5e1; box-shadow: 0 5px 14px rgba(15, 23, 42, 0.05); }
    .task-row.nest-target { background: #eff6ff !important; outline-color: #93c5fd !important; }
    
    /* 実行中タスクの強調アニメーション */
    .task-row.active-task { 
      outline: none;
      border-color: var(--ok) !important; 
      background-color: #f0fdf4 !important;
      animation: active-pulse 2s infinite; 
    }
    @keyframes active-pulse {
      0% { box-shadow: 0 0 0 0 rgba(21, 128, 61, 0.3); }
      70% { box-shadow: 0 0 0 8px rgba(21, 128, 61, 0); }
      100% { box-shadow: 0 0 0 0 rgba(21, 128, 61, 0); }
    }

    .collapse-btn { grid-area: collapse; width: 24px; height: 24px; display: grid; place-items: center; border-radius: 7px; color: var(--sub); user-select: none; font-weight: 700; border: none; background: transparent; cursor: pointer; padding: 0; }
    .collapse-btn:hover { background: rgba(0,0,0,0.05); }
    
    .task-name-display { grid-area: name; font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
    .detail-btn { grid-area: detail; border-radius: 8px; padding: 6px 12px; color: var(--sub); background: rgba(255,255,255,0.75); font-size: 0.85rem; font-weight: bold; }
    .detail-btn.open { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .icon-btn { grid-area: delete; border-radius: 8px; padding: 6px 12px; color: var(--sub); background: rgba(255,255,255,0.75); font-size: 0.9rem; font-weight: bold; }
    .icon-btn:hover { color: var(--danger); border-color: #fca5a5; background: #fef2f2; }

    .meta-wrap { grid-area: meta; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-start; }
    .badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.78); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 999px; padding: 3px 8px; font-size: 0.78rem; color: #334155; white-space: nowrap; font-weight: 600; }
    .badge.active-badge { background: var(--ok); color: white; border-color: var(--ok); }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; flex: 0 0 auto; }

    /* カラーピッカー表示制御 */
    .row-color-picker { grid-area: color; display: flex; gap: 4px; align-items: center; }
    .detail-color-picker { display: none; } /* PCでは詳細のカラーピッカーは非表示 */

    /* 詳細パネル */
    .task-detail { margin-top: 4px; margin-left: calc(var(--depth) * var(--indent) + 10px); border: 1px solid #e5e7eb; border-radius: 12px; background: #ffffff; padding: 16px; cursor: default; }
    .detail-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 12px; color: var(--sub); font-size: 0.85rem; font-weight: 700; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .detail-textarea { min-height: 80px; resize: vertical; line-height: 1.45; font-size: 0.95rem; margin-bottom: 12px; }
    .detail-label { display: block; font-size: 0.8rem; color: var(--sub); font-weight: bold; margin-bottom: 6px; }

    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .color-swatch { width: 22px; height: 22px; border-radius: 6px; border: 1px solid rgba(15, 23, 42, 0.18); padding: 0; cursor: pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35); transition: 0.1s; }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { outline: 2px solid #1d4ed8; outline-offset: 2px; transform: scale(1.1); }

    .children { margin-top: 2px; }
    .empty { text-align: center; color: var(--sub); padding: 30px 10px; border: 1px dashed #d1d5db; border-radius: 12px; background: #fcfcfd; font-size: 0.95rem; }

    /* モーダルやその他 */
    .timeline-card, .timeline, .timeline-grid, .hour-line, .hour-label, .session-block, .session-title, .session-time, .session-list, .session-item, .small-btn, .edit-btn, .stats-total, .modal, .modal-content, .modal-body, .modal-footer, .primary-btn, .cancel-btn {
        /* 省略せず元のCSSを維持 */
    }
    .timeline-card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; background: #fcfcff; margin-bottom: 16px; }
    .timeline { position: relative; border: 1px solid #e5e7eb; border-radius: 12px; background: white; overflow: hidden; margin-top: 10px; }
    .timeline-grid { position: relative; height: calc(24 * var(--hour-height)); }
    .hour-line { position: absolute; left: 0; right: 0; height: 1px; background: #eef2f7; }
    .hour-label { position: absolute; left: 8px; transform: translateY(-50%); color: #64748b; font-size: 0.75rem; background: rgba(255,255,255,0.92); padding: 0 3px; }
    .session-block { position: absolute; left: 65px; right: 10px; border-radius: 10px; padding: 5px 8px; color: #0f172a; font-size: 0.8rem; overflow: hidden; border: 1px solid rgba(15, 23, 42, 0.08); box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05); }
    .session-title { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-time { font-size: 0.75rem; opacity: 0.9; margin-top: 2px; }
    .session-list { display: grid; gap: 8px; margin-top: 16px; }
    .session-item { display: flex; gap: 12px; align-items: center; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; background: white; transition: 0.1s; }
    .session-item:hover { border-color: #bfdbfe; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05); }
    .session-item .name { font-weight: 700; font-size: 0.95rem; }
    .session-item .path { color: var(--sub); font-size: 0.8rem; margin-top: 2px; line-height: 1.35; }
    .session-item .time { font-size: 0.85rem; color: #334155; font-weight: 700; white-space: nowrap; text-align: right; }
    .small-btn { border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; font-weight: bold; background: white; border: 1px solid var(--line); cursor: pointer; color: var(--text); }
    .edit-btn { background: #f8fafc; color: var(--accent); border-color: #bfdbfe; }
    .edit-btn:hover { background: #eff6ff; }
    .stats-total { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--accent); }
    .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 1; transition: 0.2s; backdrop-filter: blur(2px); }
    .modal.hidden { opacity: 0; pointer-events: none; }
    .modal-content { background: white; border-radius: 16px; width: 90%; max-width: 440px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-content h3 { margin: 0 0 16px; font-size: 1.2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
    .modal-body > div { margin-bottom: 16px; }
    .modal-body label { display: block; font-size: 0.85rem; color: var(--sub); margin-bottom: 6px; font-weight: bold; }
    .modal-body input { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem; margin-bottom: 6px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .primary-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    .primary-btn:hover { background: #1d4ed8; }
    .cancel-btn { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }

    /* スマートフォン表示の調整 */
    @media (max-width: 640px) {
      .app { padding: 8px; } .task-create { grid-template-columns: 1fr; }
      /* スマホ時は複数行に折り返す */
      .task-row { grid-template-columns: 24px 1fr auto auto; grid-template-areas: "collapse name detail delete" "meta meta meta meta"; padding: 10px 8px; }
      .row-color-picker { display: none !important; } /* スマホ時は行のカラー選択を非表示 */
      .detail-color-picker { display: flex !important; margin-bottom: 12px; } /* 詳細のカラー選択を表示 */
      .detail-color-picker.detail-label { display: block !important; margin-bottom: 6px; }

      .session-block { left: 55px; } .tab-actions { width: 100%; margin-left: 0; }
      .session-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .session-item > .time { text-align: left; width: 100%; border-top: 1px solid #f1f5f9; padding-top: 8px; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    
    <div class="header">
      <div class="header-text">
        <h1>階層ToDo・時間記録アプリ</h1>
      </div>
      <div class="auth-container" id="auth-container">
        <button class="btn-login" id="loginBtn">Googleでログイン</button>
      </div>
    </div>

    <div id="main-app" class="hidden">
      <div class="main-nav">
        <button class="main-nav-btn active" data-view="todo">To Do List</button>
        <button class="main-nav-btn" data-view="daily">1日の記録</button>
        <button class="main-nav-btn" data-view="stats">統計</button>
      </div>

      <div id="view-todo" class="view-section active">
        <div class="tabs-row" id="tabsRow"></div>
        <section class="panel" style="border-top-left-radius: 0;">
          <div class="panel-body">
            <div class="task-create">
              <input id="newTaskInput" type="text" placeholder="新しいタスク名を入力" disabled />
              <button id="addTaskBtn" disabled>タスク追加</button>
            </div>
            <div id="taskList" class="task-list"></div>
          </div>
        </section>
      </div>

      <div id="view-daily" class="view-section">
        <section class="panel">
          <div class="panel-header">
            <input type="date" id="dailyDateInput">
            <button id="addSessionBtn" class="small-btn">＋ 新規記録を追加</button>
          </div>
          <div class="panel-body" id="dayDetail"></div>
        </section>
      </div>

      <div id="view-stats" class="view-section">
        <section class="panel">
          <div class="panel-header">
            <div>
              <input type="date" id="statStartDate"> 〜 <input type="date" id="statEndDate">
            </div>
            <button id="updateStatsBtn" class="small-btn">集計する</button>
          </div>
          <div class="panel-body" id="statsDetail"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="sessionModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">記録の編集</h3>
      <div class="modal-body">
        <div id="modalTaskNameGroup">
          <label>タスク名</label>
          <input type="text" id="modalTaskName" placeholder="記録するタスク名">
        </div>
        <div>
          <label>開始日時</label>
          <input type="datetime-local" id="modalStart">
          <button id="btnPrevEnd" class="small-btn" style="width:100%; margin-top:4px; font-weight:normal;">前タスクの終了時刻</button>
        </div>
        <div>
          <label>終了日時</label>
          <input type="datetime-local" id="modalEnd">
          <button id="btnNextStart" class="small-btn" style="width:100%; margin-top:4px; font-weight:normal;">次タスクの開始時刻</button>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modalCancelBtn" class="cancel-btn">キャンセル</button>
        <button id="modalSaveBtn" class="primary-btn">保存する</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBtl8Gzq-mNj7bqfXWwQxKRqo0AYvJfjfQ",
      authDomain: "time-tracker-app-5d79a.firebaseapp.com",
      projectId: "time-tracker-app-5d79a",
      storageBucket: "time-tracker-app-5d79a.firebasestorage.app",
      messagingSenderId: "847291983854",
      appId: "1:847291983854:web:dbb2d55541af1d1fbc50ff"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let unsubscribeSnapshot = null;

    const COLOR_PALETTE = [
      { key: 'rose', label: 'ローズ', solid: '#e11d48', soft: 'rgba(225, 29, 72, 0.12)', mid: 'rgba(225, 29, 72, 0.26)' },
      { key: 'orange', label: 'オレンジ', solid: '#ea580c', soft: 'rgba(234, 88, 12, 0.12)', mid: 'rgba(234, 88, 12, 0.26)' },
      { key: 'amber', label: 'アンバー', solid: '#d97706', soft: 'rgba(217, 119, 6, 0.12)', mid: 'rgba(217, 119, 6, 0.26)' },
      { key: 'green', label: 'グリーン', solid: '#16a34a', soft: 'rgba(22, 163, 74, 0.12)', mid: 'rgba(22, 163, 74, 0.26)' },
      { key: 'teal', label: 'ティール', solid: '#0f766e', soft: 'rgba(15, 118, 110, 0.12)', mid: 'rgba(15, 118, 110, 0.26)' },
      { key: 'blue', label: 'ブルー', solid: '#2563eb', soft: 'rgba(37, 99, 235, 0.12)', mid: 'rgba(37, 99, 235, 0.26)' },
      { key: 'violet', label: 'バイオレット', solid: '#7c3aed', soft: 'rgba(124, 58, 237, 0.12)', mid: 'rgba(124, 58, 237, 0.26)' },
      { key: 'slate', label: 'スレート', solid: '#475569', soft: 'rgba(71, 85, 105, 0.12)', mid: 'rgba(71, 85, 105, 0.26)' }
    ];

    const now = new Date();
    let state = {
      tabs: [{ id: 'tab_default', name: '日常', colorKey: 'blue' }],
      activeTabId: 'tab_default',
      tasks: [],
      activeTaskId: null,
      selectedDate: toDateKey(now)
    };

    const dragState = { draggingId: null, overGapKey: null, overNestId: null };
    
    // モーダル用ステート
    let modalMode = null; // 'add' | 'edit'
    let modalTargetTaskId = null;
    let modalTargetSessionIndex = null;

    const els = {
      authContainer: document.getElementById('auth-container'),
      mainApp: document.getElementById('main-app'),
      loginBtn: document.getElementById('loginBtn'),
      tabsRow: document.getElementById('tabsRow'),
      newTaskInput: document.getElementById('newTaskInput'), 
      addTaskBtn: document.getElementById('addTaskBtn'),
      taskList: document.getElementById('taskList'), 
      dayDetail: document.getElementById('dayDetail'),
      dailyDateInput: document.getElementById('dailyDateInput'),
      statStartDate: document.getElementById('statStartDate'),
      statEndDate: document.getElementById('statEndDate'),
      updateStatsBtn: document.getElementById('updateStatsBtn'),
      statsDetail: document.getElementById('statsDetail'),
      mainNavBtns: document.querySelectorAll('.main-nav-btn'),
      viewSections: document.querySelectorAll('.view-section'),
      addSessionBtn: document.getElementById('addSessionBtn'),
      // Modal
      sessionModal: document.getElementById('sessionModal'),
      modalCancelBtn: document.getElementById('modalCancelBtn'),
      modalSaveBtn: document.getElementById('modalSaveBtn')
    };

    els.dailyDateInput.value = state.selectedDate;
    els.statStartDate.value = state.selectedDate;
    els.statEndDate.value = state.selectedDate;

    els.mainNavBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        els.mainNavBtns.forEach(b => b.classList.remove('active'));
        els.viewSections.forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
        if(btn.dataset.view === 'stats') renderStats();
        if(btn.dataset.view === 'daily') renderDayDetail();
      });
    });

    els.loginBtn.addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(error => console.error("Login Error:", error));
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        els.authContainer.innerHTML = `
          <div class="user-info">
            <img src="${user.photoURL || 'https://via.placeholder.com/28'}" class="user-avatar" alt="icon">
            ${user.displayName || 'ユーザー'}
            <span style="font-size:0.75rem; color:var(--sub); font-weight:normal;" id="sync-status">同期中...</span>
          </div>
          <button class="btn-logout" id="logoutBtn">ログアウト</button>
        `;
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        
        els.mainApp.classList.remove('hidden');
        els.newTaskInput.disabled = false;
        els.addTaskBtn.disabled = false;

        subscribeToData(user.uid);
      } else {
        currentUser = null;
        if(unsubscribeSnapshot) unsubscribeSnapshot();
        
        els.authContainer.innerHTML = `<button class="btn-login" id="loginBtn">Googleでログイン</button>`;
        document.getElementById('loginBtn').addEventListener('click', () => signInWithPopup(auth, provider).catch(console.error));

        els.mainApp.classList.add('hidden');
        els.newTaskInput.disabled = true;
        els.addTaskBtn.disabled = true;
        state.tasks = [];
        render();
      }
    });

    function subscribeToData(uid) {
      const docRef = doc(db, "users_data", uid);
      unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
        const statusEl = document.getElementById('sync-status');
        if (docSnap.exists()) {
          const data = docSnap.data();
          if (!docSnap.metadata.hasPendingWrites) {
            state = { ...state, ...data };
            if(statusEl) { statusEl.textContent = "✔ 同期済"; statusEl.style.color = "var(--ok)"; }
            render();
            renderStats();
          }
        } else {
          if(statusEl) statusEl.textContent = "初期設定中...";
          saveState();
        }
      });
    }

    async function saveState() {
      if (!currentUser) return;
      const statusEl = document.getElementById('sync-status');
      if(statusEl) { statusEl.textContent = "↑ 保存中..."; statusEl.style.color = "var(--accent)"; }
      try {
        const docRef = doc(db, "users_data", currentUser.uid);
        await setDoc(docRef, state);
        if(statusEl) { statusEl.textContent = "✔ 同期済"; statusEl.style.color = "var(--ok)"; }
      } catch (error) {
        console.error("Save Error:", error);
        if(statusEl) { statusEl.textContent = "⚠ エラー"; statusEl.style.color = "var(--danger)"; }
      }
    }

    bindEvents();

    setInterval(() => {
      if(!currentUser) return;
      const focused = document.activeElement;
      const editingText = focused && focused.classList && (focused.classList.contains('detail-task-name') || focused.classList.contains('detail-textarea'));
      if (state.activeTaskId && !dragState.draggingId && !editingText && els.sessionModal.classList.contains('hidden')) {
        renderTaskList();
        renderDayDetail();
      }
    }, 1000);

    function bindEvents() {
      els.addTaskBtn.addEventListener('click', addRootTaskFromInput);
      els.newTaskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addRootTaskFromInput(); });
      
      els.dailyDateInput.addEventListener('change', (e) => {
        state.selectedDate = e.target.value;
        saveState(); renderDayDetail();
      });

      els.updateStatsBtn.addEventListener('click', renderStats);
      
      els.addSessionBtn.addEventListener('click', openModalForAdd);
      els.modalCancelBtn.addEventListener('click', closeModal);
      els.modalSaveBtn.addEventListener('click', saveModal);
    }

    function currentTabId() { return state.activeTabId; }
    function currentTab() { return state.tabs.find(tab => tab.id === currentTabId()) || state.tabs[0] || null; }

    function addRootTaskFromInput() {
      const name = els.newTaskInput.value.trim();
      if (!name) return;
      createTask(name, null, currentTabId());
      els.newTaskInput.value = '';
    }

    function createTask(name, parentId = null, tabId = currentTabId()) {
      const siblings = getChildren(parentId, tabId);
      const newTask = {
        id: generateId('task'), name, parentId, tabId,
        order: siblings.length, sessions: [], activeStart: null,
        collapsed: false, note: '', detailOpen: false,
        colorKey: defaultColorKeyForTask(name + Date.now())
      };
      state.tasks.push(newTask);
      saveState(); render();
    }

    function createTab() {
      const name = prompt('新しいタブ名を入力してください', `新しいタブ${state.tabs.length + 1}`);
      if (!name || !name.trim()) return;
      const tab = { id: generateId('tab'), name: name.trim(), colorKey: COLOR_PALETTE[state.tabs.length % COLOR_PALETTE.length].key };
      state.tabs.push(tab); state.activeTabId = tab.id;
      saveState(); render();
    }

    function renameActiveTab() {
      const tab = currentTab(); if (!tab) return;
      const name = prompt('タブ名を入力してください', tab.name);
      if (!name || !name.trim()) return;
      tab.name = name.trim();
      saveState(); renderTabs(); renderDayDetail();
    }

    function deleteActiveTab() {
      if (state.tabs.length <= 1) { alert('最後の1つのタブは削除できません。'); return; }
      const tab = currentTab(); if (!tab) return;
      if (!confirm(`「${tab.name}」タブを削除しますか？\nタスクと記録も削除されます。`)) return;
      getTasksInTab(tab.id).forEach(task => stopTask(task.id, false));
      state.tasks = state.tasks.filter(task => task.tabId !== tab.id);
      state.tabs = state.tabs.filter(t => t.id !== tab.id);
      state.activeTabId = state.tabs[0].id;
      saveState(); render();
    }

    function switchTab(tabId) {
      if (!state.tabs.some(tab => tab.id === tabId)) return;
      state.activeTabId = tabId; saveState(); render();
    }

    function updateTaskColor(taskId, colorKey) {
      const task = getTask(taskId); if (!task) return;
      task.colorKey = COLOR_PALETTE.some(c => c.key === colorKey) ? colorKey : task.colorKey;
      saveState(); renderTaskList();
    }
    
    // 詳細パネルの開閉 (閉じるときに状態を保存する)
    function toggleTaskDetail(taskId) {
      const task = getTask(taskId); if (!task) return;
      task.detailOpen = !task.detailOpen; 
      saveState(); renderTaskList();
    }
    function toggleCollapsed(taskId) {
      const task = getTask(taskId); if (!task) return;
      task.collapsed = !task.collapsed; saveState(); renderTaskList();
    }

    function deleteTask(taskId) {
      const task = getTask(taskId); if (!task) return;
      const deleteIds = new Set([taskId, ...getDescendantIds(taskId, task.tabId)]);
      deleteIds.forEach(id => stopTask(id, false));
      state.tasks = state.tasks.filter(t => !deleteIds.has(t.id));
      normalizeOrders(task.parentId, task.tabId);
      saveState(); render();
    }

    function toggleTaskTimer(taskId) {
      const task = getTask(taskId);
      if (!task) return;
      if (task.activeStart) stopTask(taskId);
      else startTask(taskId);
    }

    function startTask(taskId) {
      const task = getTask(taskId); if (!task) return;
      if (state.activeTaskId && state.activeTaskId !== taskId) stopTask(state.activeTaskId, false);
      if (task.activeStart) return;
      task.activeStart = new Date().toISOString(); state.activeTaskId = taskId;
      saveState(); render();
    }

    function stopTask(taskId, shouldRender = true) {
      const task = getTask(taskId); if (!task || !task.activeStart) return;
      const start = new Date(task.activeStart).getTime(), end = Date.now();
      if (end > start) task.sessions.push({ start: task.activeStart, end: new Date(end).toISOString() });
      task.activeStart = null;
      if (state.activeTaskId === taskId) state.activeTaskId = null;
      saveState(); if (shouldRender) render();
    }

    function moveTask(taskId, newParentId, newIndex) {
      const task = getTask(taskId); if (!task || taskId === newParentId) return;
      if (newParentId && isDescendant(newParentId, taskId, task.tabId)) return;
      const oldParentId = task.parentId, tabId = task.tabId;
      const oldSiblingIds = getChildren(oldParentId, tabId).map(t => t.id).filter(id => id !== taskId);
      const targetSiblingIds = (newParentId === oldParentId) ? oldSiblingIds.slice() : getChildren(newParentId, tabId).map(t => t.id).filter(id => id !== taskId);
      const clampedIndex = Math.max(0, Math.min(newIndex, targetSiblingIds.length));
      targetSiblingIds.splice(clampedIndex, 0, taskId);
      task.parentId = newParentId;
      if (newParentId === oldParentId) { setSiblingOrder(newParentId, targetSiblingIds, tabId); } 
      else { setSiblingOrder(oldParentId, oldSiblingIds, tabId); setSiblingOrder(newParentId, targetSiblingIds, tabId); }
      saveState(); renderTaskList();
    }

    function makeSubtask(taskId, targetTaskId) {
      const target = getTask(targetTaskId), task = getTask(taskId);
      if (!target || !task || target.tabId !== task.tabId) return;
      moveTask(taskId, targetTaskId, getChildren(targetTaskId, task.tabId).length);
    }

    // モーダル関連処理
    function toDatetimeLocal(date) {
      const d = new Date(date);
      if (isNaN(d.getTime())) return '';
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function getAdjacentTimes(taskId, sessionIndex) {
      const all = [];
      state.tasks.forEach(t => {
        t.sessions.forEach((s, idx) => {
          all.push({ taskId: t.id, sessionIndex: idx, start: new Date(s.start).getTime(), end: new Date(s.end).getTime() });
        });
      });
      all.sort((a, b) => a.start - b.start);

      let prevEnd = null;
      let nextStart = null;

      if (sessionIndex === -1) {
        if (all.length > 0) prevEnd = all[all.length - 1].end;
      } else {
        const currentIndex = all.findIndex(item => item.taskId === taskId && item.sessionIndex === sessionIndex);
        if (currentIndex > 0) prevEnd = all[currentIndex - 1].end;
        if (currentIndex < all.length - 1) nextStart = all[currentIndex + 1].start;
      }
      return { prevEnd, nextStart };
    }

    function setupAdjacentButtons(prevEnd, nextStart) {
      const btnPrev = document.getElementById('btnPrevEnd');
      if (prevEnd) {
        btnPrev.style.display = 'block';
        btnPrev.onclick = () => document.getElementById('modalStart').value = toDatetimeLocal(prevEnd);
        btnPrev.textContent = `前タスクの終了時刻に合わせる (${formatTime(new Date(prevEnd))})`;
      } else { btnPrev.style.display = 'none'; }
      
      const btnNext = document.getElementById('btnNextStart');
      if (nextStart) {
        btnNext.style.display = 'block';
        btnNext.onclick = () => document.getElementById('modalEnd').value = toDatetimeLocal(nextStart);
        btnNext.textContent = `次タスクの開始時刻に合わせる (${formatTime(new Date(nextStart))})`;
      } else { btnNext.style.display = 'none'; }
    }

    function openModalForEdit(taskId, sessionIndex) {
      modalMode = 'edit'; modalTargetTaskId = taskId; modalTargetSessionIndex = sessionIndex;
      const task = getTask(taskId), session = task.sessions[sessionIndex];
      
      document.getElementById('modalTitle').textContent = '記録の編集';
      document.getElementById('modalTaskNameGroup').style.display = 'none';
      document.getElementById('modalStart').value = toDatetimeLocal(session.start);
      document.getElementById('modalEnd').value = toDatetimeLocal(session.end);
      
      const { prevEnd, nextStart } = getAdjacentTimes(taskId, sessionIndex);
      setupAdjacentButtons(prevEnd, nextStart);
      els.sessionModal.classList.remove('hidden');
    }

    function openModalForAdd() {
      modalMode = 'add'; modalTargetTaskId = null; modalTargetSessionIndex = null;
      document.getElementById('modalTitle').textContent = '新規記録の追加';
      document.getElementById('modalTaskNameGroup').style.display = 'block';
      document.getElementById('modalTaskName').value = '';
      
      const baseDate = state.selectedDate ? new Date(state.selectedDate) : new Date();
      baseDate.setHours(12, 0, 0, 0);
      const endBase = new Date(baseDate.getTime() + 60 * 60 * 1000);
      
      document.getElementById('modalStart').value = toDatetimeLocal(baseDate);
      document.getElementById('modalEnd').value = toDatetimeLocal(endBase);
      
      const { prevEnd } = getAdjacentTimes(null, -1);
      setupAdjacentButtons(prevEnd, null);
      els.sessionModal.classList.remove('hidden');
    }

    function closeModal() { els.sessionModal.classList.add('hidden'); }

    function saveModal() {
      const startVal = document.getElementById('modalStart').value;
      const endVal = document.getElementById('modalEnd').value;
      if (!startVal || !endVal) return alert('日時を入力してください');
      
      const startIso = new Date(startVal).toISOString(), endIso = new Date(endVal).toISOString();
      if (new Date(startIso).getTime() >= new Date(endIso).getTime()) return alert('終了日時は開始日時より後にしてください');

      if (modalMode === 'edit') {
        const task = getTask(modalTargetTaskId);
        task.sessions[modalTargetSessionIndex] = { start: startIso, end: endIso };
      } else if (modalMode === 'add') {
        const name = document.getElementById('modalTaskName').value.trim() || '無題タスク';
        let task = state.tasks.find(t => t.name === name);
        if (!task) {
          task = {
            id: generateId('task'), name, parentId: null, tabId: currentTabId(),
            order: getChildren(null, currentTabId()).length, sessions: [], activeStart: null,
            collapsed: false, note: '', detailOpen: false, colorKey: defaultColorKeyForTask(name + Date.now())
          };
          state.tasks.push(task);
        }
        task.sessions.push({ start: startIso, end: endIso });
      }
      
      closeModal(); saveState(); render();
    }

    function generateId(prefix) { return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`; }
    function getTask(taskId) { return state.tasks.find(t => t.id === taskId) || null; }
    function getTab(tabId) { return state.tabs.find(t => t.id === tabId) || null; }
    function getTasksInTab(tabId = currentTabId()) { return state.tasks.filter(t => t.tabId === tabId); }
    function getChildren(parentId, tabId = currentTabId()) {
      return state.tasks.filter(t => t.tabId === tabId && t.parentId === parentId).sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));
    }
    function setSiblingOrder(parentId, orderedIds, tabId = currentTabId()) {
      orderedIds.forEach((id, index) => {
        const task = getTask(id); if (task && task.tabId === tabId) { task.parentId = parentId; task.order = index; }
      });
    }
    function normalizeOrders(parentId, tabId = currentTabId()) {
      getChildren(parentId, tabId).forEach((task, index) => task.order = index);
    }
    function getDescendantIds(taskId, tabId = currentTabId()) {
      const result = [], queue = [taskId];
      while (queue.length) {
        const current = queue.shift();
        getChildren(current, tabId).forEach(child => { result.push(child.id); queue.push(child.id); });
      }
      return result;
    }
    function isDescendant(descendantId, ancestorId, tabId = currentTabId()) {
      let current = getTask(descendantId);
      while (current && current.parentId) {
        if (current.tabId !== tabId) return false;
        if (current.parentId === ancestorId) return true;
        current = getTask(current.parentId);
      }
      return false;
    }
    function hasChildren(taskId) { const task = getTask(taskId); return task ? getChildren(taskId, task.tabId).length > 0 : false; }
    function getTaskPath(taskId) {
      const names = []; let current = getTask(taskId);
      while (current) { names.unshift(current.name); current = current.parentId ? getTask(current.parentId) : null; }
      return names;
    }

    function getOwnDurationMs(taskId) {
      const task = getTask(taskId); if (!task) return 0;
      let total = 0;
      for (const s of task.sessions) {
        const start = new Date(s.start).getTime(), end = new Date(s.end).getTime();
        if (Number.isFinite(start) && Number.isFinite(end) && end > start) total += end - start;
      }
      if (task.activeStart) {
        const start = new Date(task.activeStart).getTime();
        if (Number.isFinite(start)) total += Math.max(0, Date.now() - start);
      }
      return total;
    }
    function getDescendantDurationMs(taskId) {
      const task = getTask(taskId); if (!task) return 0;
      return getDescendantIds(taskId, task.tabId).reduce((sum, id) => sum + getOwnDurationMs(id), 0);
    }

    function getAllSessionsWithDaySplit(dateKey, options = {}) {
      const { includeAllTabs = false, tabId = currentTabId() } = options;
      const dayStart = new Date(dateKey + 'T00:00:00'), dayEnd = new Date(dateKey + 'T24:00:00');
      const segments = [];
      const tasks = includeAllTabs ? state.tasks.slice() : getTasksInTab(tabId);

      for (const task of tasks) {
        const allSessions = task.sessions.map((s, idx) => ({ start: s.start, end: s.end, sessionIndex: idx }));
        if (task.activeStart) allSessions.push({ start: task.activeStart, end: new Date().toISOString(), active: true, sessionIndex: 'active' });

        for (const session of allSessions) {
          const start = new Date(session.start), end = new Date(session.end);
          if (!(end > dayStart && start < dayEnd)) continue;
          const clippedStart = new Date(Math.max(start.getTime(), dayStart.getTime()));
          const clippedEnd = new Date(Math.min(end.getTime(), dayEnd.getTime()));
          if (clippedEnd <= clippedStart) continue;

          const tab = getTab(task.tabId);
          segments.push({
            taskId: task.id, taskName: task.name, path: getTaskPath(task.id),
            tabId: task.tabId, tabName: tab ? tab.name : '無題タブ', tabColorKey: tab ? tab.colorKey : 'blue',
            start: clippedStart, end: clippedEnd, isActive: Boolean(session.active), sessionIndex: session.sessionIndex
          });
        }
      }
      return segments.sort((a, b) => a.start - b.start);
    }

    function render() {
      if(!currentUser) return;
      renderTabs(); renderTaskList(); renderDayDetail();
    }

    function renderTabs() {
      els.tabsRow.innerHTML = '';
      state.tabs.forEach(tab => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (tab.id === currentTabId() ? ' active' : '');
        btn.innerHTML = `<span class="tab-dot" style="background:${colorForTab(tab.id)}"></span>${escapeHtml(tab.name)}`;
        btn.addEventListener('click', () => switchTab(tab.id));
        els.tabsRow.appendChild(btn);
      });

      const actions = document.createElement('div'); actions.className = 'tab-actions';
      const addBtn = document.createElement('button'); addBtn.className = 'tab-action-btn'; addBtn.textContent = '＋ 追加'; addBtn.addEventListener('click', createTab); actions.appendChild(addBtn);
      const renameBtn = document.createElement('button'); renameBtn.className = 'tab-action-btn'; renameBtn.textContent = '名前変更'; renameBtn.addEventListener('click', renameActiveTab); actions.appendChild(renameBtn);
      const deleteBtn = document.createElement('button'); deleteBtn.className = 'tab-action-btn'; deleteBtn.textContent = '削除'; deleteBtn.addEventListener('click', deleteActiveTab); actions.appendChild(deleteBtn);
      els.tabsRow.appendChild(actions);
    }

    function renderTaskList() {
      els.taskList.innerHTML = '';
      if (getTasksInTab().length === 0) {
        const empty = document.createElement('div'); empty.className = 'empty'; empty.textContent = 'このタブにはまだタスクがありません。'; els.taskList.appendChild(empty);
        return;
      }
      els.taskList.appendChild(renderTaskChildren(null, 0, currentTabId()));
    }

    function renderTaskChildren(parentId, depth, tabId) {
      const wrapper = document.createElement('div'); wrapper.className = 'children';
      wrapper.appendChild(createGap(parentId, 0, depth, tabId));
      getChildren(parentId, tabId).forEach((task, index) => {
        const block = document.createElement('div'); block.className = 'task-block';
        block.appendChild(createTaskRow(task, depth));
        if (task.detailOpen) block.appendChild(createDetailPanel(task, depth));
        if (!task.collapsed && hasChildren(task.id)) block.appendChild(renderTaskChildren(task.id, depth + 1, tabId));
        wrapper.appendChild(block);
        wrapper.appendChild(createGap(parentId, index + 1, depth, tabId));
      });
      return wrapper;
    }

    function createGap(parentId, index, depth, tabId) {
      const gap = document.createElement('div'); const key = `${tabId}__${parentId ?? 'root'}__${index}`;
      gap.className = 'drop-gap'; gap.dataset.gapKey = key; gap.style.setProperty('--depth', depth);
      if (dragState.overGapKey === key) gap.classList.add('active');

      gap.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (dragState.overGapKey !== key || dragState.overNestId !== null) { dragState.overGapKey = key; dragState.overNestId = null; updateDragHighlights(); }
      });
      gap.addEventListener('dragleave', () => { if (dragState.overGapKey === key) { dragState.overGapKey = null; updateDragHighlights(); } });
      gap.addEventListener('drop', (e) => {
        e.preventDefault(); if (!dragState.draggingId) return;
        const draggedId = dragState.draggingId; clearDragState(false); moveTask(draggedId, parentId, index);
      });
      return gap;
    }

    function createTaskRow(task, depth) {
      const row = document.createElement('div'); row.className = 'task-row'; row.dataset.taskId = task.id; row.style.setProperty('--depth', depth);
      applyTaskRowColor(row, task);
      if (task.activeStart) row.classList.add('active-task');
      if (dragState.overNestId === task.id) row.classList.add('nest-target');

      // 行全体をドラッグ可能に
      row.draggable = true;
      row.addEventListener('dragstart', (e) => {
        dragState.draggingId = task.id;
        if (e.dataTransfer) { e.dataTransfer.setData('text/plain', task.id); e.dataTransfer.effectAllowed = 'move'; }
      });
      row.addEventListener('dragend', () => clearDragState());

      // 行クリックでStart/Stopトグル (特定の要素は除外)
      row.addEventListener('click', (e) => {
        if (e.target.closest('button') || e.target.closest('.color-picker') || e.target.closest('input') || e.target.closest('textarea')) return;
        toggleTaskTimer(task.id);
      });

      const collapseBtn = document.createElement('button'); collapseBtn.className = 'collapse-btn'; collapseBtn.textContent = hasChildren(task.id) ? (task.collapsed ? '▶' : '▼') : '•'; collapseBtn.disabled = !hasChildren(task.id);
      collapseBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleCollapsed(task.id); }); 
      row.appendChild(collapseBtn);

      const nameDiv = document.createElement('div'); nameDiv.className = 'task-name-display'; nameDiv.textContent = task.name;
      row.appendChild(nameDiv);

      const meta = document.createElement('div'); meta.className = 'meta-wrap';
      if (task.activeStart) { const b = document.createElement('span'); b.className = 'badge active-badge'; b.textContent = '⏱ 計測中'; meta.appendChild(b); }
      if (hasChildren(task.id)) { meta.innerHTML += `<span class="badge"><span class="dot" style="background:${colorForTask(task.id)}"></span>子合計 ${formatDuration(getDescendantDurationMs(task.id))}</span>`; } 
      else { meta.innerHTML += `<span class="badge"><span class="dot" style="background:${colorForTask(task.id)}"></span>${formatDuration(getOwnDurationMs(task.id))}</span>`; }
      row.appendChild(meta);

      // PC用の行内カラーピッカー
      const rowColorPicker = document.createElement('div');
      rowColorPicker.className = 'color-picker row-color-picker';
      COLOR_PALETTE.forEach(color => {
        const swatch = document.createElement('button');
        swatch.className = 'color-swatch' + (task.colorKey === color.key ? ' selected' : '');
        swatch.style.background = color.solid;
        swatch.addEventListener('click', (e) => { e.stopPropagation(); updateTaskColor(task.id, color.key); });
        rowColorPicker.appendChild(swatch);
      });
      row.appendChild(rowColorPicker);

      const detailBtn = document.createElement('button'); detailBtn.className = 'detail-btn' + (task.detailOpen ? ' open' : ''); detailBtn.textContent = '詳細';
      detailBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleTaskDetail(task.id); }); 
      row.appendChild(detailBtn);

      const delBtn = document.createElement('button'); delBtn.className = 'icon-btn'; delBtn.textContent = '×';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); if (confirm(`「${task.name}」を削除しますか？\n子タスクも一緒に削除されます。`)) deleteTask(task.id); }); 
      row.appendChild(delBtn);

      row.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!dragState.draggingId || dragState.draggingId === task.id || isDescendant(task.id, dragState.draggingId, task.tabId)) return;
        if (dragState.overNestId !== task.id || dragState.overGapKey !== null) { dragState.overNestId = task.id; dragState.overGapKey = null; updateDragHighlights(); }
      });
      row.addEventListener('dragleave', () => { if (dragState.overNestId === task.id) { dragState.overNestId = null; updateDragHighlights(); } });
      row.addEventListener('drop', (e) => {
        e.preventDefault(); if (!dragState.draggingId) return;
        const draggedId = dragState.draggingId; clearDragState(false); makeSubtask(draggedId, task.id);
      });
      return row;
    }

    function createDetailPanel(task, depth) {
      const panel = document.createElement('div'); panel.className = 'task-detail'; panel.style.setProperty('--depth', depth);
      panel.innerHTML = `<div class="detail-head"><span>詳細情報</span></div>`;
      
      const nameLabel = document.createElement('label'); nameLabel.className = 'detail-label'; nameLabel.textContent = 'タスク名'; panel.appendChild(nameLabel);
      const nameInput = document.createElement('input'); nameInput.className = 'detail-task-name'; nameInput.value = task.name;
      // 入力時はローカル変数のみ更新（再描画を防ぐ）
      nameInput.addEventListener('input', () => { task.name = nameInput.value; });
      panel.appendChild(nameInput);
      
      const memoLabel = document.createElement('label'); memoLabel.className = 'detail-label'; memoLabel.textContent = 'メモ'; panel.appendChild(memoLabel);
      const textarea = document.createElement('textarea'); textarea.className = 'detail-textarea'; textarea.placeholder = 'メモを入力'; textarea.value = task.note || '';
      // 入力時はローカル変数のみ更新
      textarea.addEventListener('input', () => { task.note = textarea.value; });
      panel.appendChild(textarea);
      
      // スマホ用の詳細内カラーピッカー
      const colorLabel = document.createElement('label'); colorLabel.className = 'detail-label detail-color-picker'; colorLabel.textContent = 'カラー'; panel.appendChild(colorLabel);
      const colorPicker = document.createElement('div'); colorPicker.className = 'color-picker detail-color-picker';
      COLOR_PALETTE.forEach(color => {
        const swatch = document.createElement('button'); swatch.className = 'color-swatch' + (task.colorKey === color.key ? ' selected' : ''); swatch.style.background = color.solid;
        swatch.addEventListener('click', (e) => { e.stopPropagation(); updateTaskColor(task.id, color.key); }); colorPicker.appendChild(swatch);
      });
      panel.appendChild(colorPicker);

      // 保存ボタンの追加
      const actionWrap = document.createElement('div');
      actionWrap.style.display = 'flex'; actionWrap.style.justifyContent = 'flex-end'; actionWrap.style.marginTop = '16px';
      
      const saveBtn = document.createElement('button');
      saveBtn.className = 'primary-btn';
      saveBtn.style.padding = '8px 16px'; saveBtn.style.fontSize = '0.95rem';
      saveBtn.textContent = '保存して閉じる';
      saveBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        // 最終的な値をセットして保存
        task.name = nameInput.value.trim() || '無題タスク';
        task.note = textarea.value;
        toggleTaskDetail(task.id); // 詳細を閉じつつ、saveStateと再描画を行う
      });
      
      actionWrap.appendChild(saveBtn);
      panel.appendChild(actionWrap);

      // パネル内クリックでタイマートグルさせない
      panel.addEventListener('click', (e) => e.stopPropagation());

      return panel;
    }

    function renderDayDetail() {
      const dateKey = state.selectedDate, segments = getAllSessionsWithDaySplit(dateKey, { includeAllTabs: true });
      els.dayDetail.innerHTML = '';
      
      const header = document.createElement('div'); header.className = 'timeline-card';
      if (segments.length === 0) { header.innerHTML += `<div class="empty">この日の記録はありません。</div>`; els.dayDetail.appendChild(header); return; }

      const timeline = document.createElement('div'); timeline.className = 'timeline';
      const grid = document.createElement('div'); grid.className = 'timeline-grid';
      for (let h = 0; h <= 24; h++) {
        const top = h * hourHeight();
        grid.innerHTML += `<div class="hour-line" style="top:${top}px;"></div>`;
        if (h < 24) grid.innerHTML += `<div class="hour-label" style="top:${top}px;">${String(h).padStart(2, '0')}:00</div>`;
      }
      segments.forEach(seg => {
        const startM = seg.start.getHours() * 60 + seg.start.getMinutes() + seg.start.getSeconds() / 60;
        const endM = seg.end.getHours() * 60 + seg.end.getMinutes() + seg.end.getSeconds() / 60;
        const top = (startM / 60) * hourHeight(), height = Math.max(12, ((endM - startM) / 60) * hourHeight());
        grid.innerHTML += `<div class="session-block" style="top:${top}px; height:${height}px; background:${colorForTab(seg.tabId, 0.26)}; border-color:${colorForTab(seg.tabId, 0.42)}">
          <div class="session-title">${escapeHtml(seg.taskName)}</div>
          <div class="session-time">${formatTime(seg.start)} - ${formatTime(seg.end)}</div></div>`;
      });
      timeline.appendChild(grid); header.appendChild(timeline);

      const list = document.createElement('div'); list.className = 'session-list';
      segments.forEach(seg => {
        const item = document.createElement('div'); item.className = 'session-item';
        item.innerHTML = `
          <span class="dot" style="background:${colorForTab(seg.tabId)}; width:12px; height:12px;"></span>
          <div style="flex: 1; min-width: 0;">
            <div class="name">${escapeHtml(seg.taskName)}</div>
            <div class="path">${escapeHtml(seg.path.join(' > '))}</div>
          </div>
          <div class="time">
            ${formatTime(seg.start)} - ${formatTime(seg.end)}<br>
            <span style="font-weight: normal; color: var(--sub);">${formatDuration(seg.end - seg.start)}</span>
          </div>
        `;
        
        // 計測中のものは編集ボタンを非表示
        if (seg.sessionIndex !== 'active') {
          const editBtn = document.createElement('button');
          editBtn.className = 'small-btn edit-btn'; editBtn.textContent = '編集';
          editBtn.addEventListener('click', (e) => { e.stopPropagation(); openModalForEdit(seg.taskId, seg.sessionIndex); });
          item.appendChild(editBtn);
        } else {
          const badge = document.createElement('span'); badge.className = 'badge active-badge'; badge.textContent = '計測中'; item.appendChild(badge);
        }

        list.appendChild(item);
      });
      header.appendChild(list);
      els.dayDetail.appendChild(header);
    }

    function renderStats() {
      const startStr = document.getElementById('statStartDate').value;
      const endStr = document.getElementById('statEndDate').value;
      if(!startStr || !endStr) return;
      
      const startDate = new Date(startStr + 'T00:00:00').getTime();
      const endDate = new Date(endStr + 'T23:59:59').getTime();
      
      const rootTasks = state.tasks.filter(t => t.parentId === null);
      
      const stats = rootTasks.map(root => {
        const descendantIds = [root.id, ...getDescendantIds(root.id, root.tabId)];
        let totalMs = 0;
        
        descendantIds.forEach(id => {
          const task = getTask(id);
          task.sessions.forEach(s => {
            const sStart = new Date(s.start).getTime(), sEnd = new Date(s.end).getTime();
            const overlapStart = Math.max(startDate, sStart), overlapEnd = Math.min(endDate, sEnd);
            if(overlapEnd > overlapStart) totalMs += (overlapEnd - overlapStart);
          });
          if(task.activeStart) {
            const sStart = new Date(task.activeStart).getTime(), sEnd = Date.now();
            const overlapStart = Math.max(startDate, sStart), overlapEnd = Math.min(endDate, sEnd);
            if(overlapEnd > overlapStart) totalMs += (overlapEnd - overlapStart);
          }
        });
        return { task: root, ms: totalMs };
      }).filter(x => x.ms > 0).sort((a,b) => b.ms - a.ms);
      
      let html = '';
      if(stats.length === 0) {
        html = '<div class="empty">指定した期間の記録はありません。</div>';
      } else {
        const totalAll = stats.reduce((sum, item) => sum + item.ms, 0);
        html += `<div class="stats-total">合計時間: ${formatDuration(totalAll)}</div>`;
        html += '<div class="session-list">';
        stats.forEach(s => {
          html += `<div class="session-item" style="gap: 16px;">
            <div style="flex:1;">
              <div class="name">${escapeHtml(s.task.name)}</div>
              <div style="margin-top:4px;"><span class="badge" style="font-size:0.75rem;"><span class="dot" style="background:${colorForTab(s.task.tabId)}"></span>${escapeHtml(getTab(s.task.tabId)?.name || '無題')}</span></div>
            </div>
            <div class="time" style="font-size: 1.1rem;">${formatDuration(s.ms)}</div>
          </div>`;
        });
        html += '</div>';
      }
      
      els.statsDetail.innerHTML = html;
    }

    function clearDragState(shouldRefreshTaskList = true) { dragState.draggingId = null; dragState.overGapKey = null; dragState.overNestId = null; if (shouldRefreshTaskList) updateDragHighlights(); }
    function updateDragHighlights() {
      document.querySelectorAll('.drop-gap').forEach(el => el.classList.toggle('active', el.dataset.gapKey === dragState.overGapKey));
      document.querySelectorAll('.task-row').forEach(el => el.classList.toggle('nest-target', el.dataset.taskId === dragState.overNestId));
    }
    function toDateKey(date) { const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; }
    function formatTime(date) { return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`; }
    function formatDuration(ms, short = false) {
      const sec = Math.max(0, Math.floor(ms / 1000)), h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      if (short) return h > 0 ? `${h}h ${m}m` : (m > 0 ? `${m}m` : `${s}s`);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }
    function hourHeight() { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hour-height')) || 28; }
    function defaultColorKeyForTask(seed) { const str = String(seed || 'task'), index = [...str].reduce((acc, ch) => acc + ch.charCodeAt(0), 0) % COLOR_PALETTE.length; return COLOR_PALETTE[index].key; }
    function getColorDef(colorKey) { return COLOR_PALETTE.find(c => c.key === colorKey) || COLOR_PALETTE[0]; }
    function colorForTask(taskId, alpha) { const task = getTask(taskId), color = getColorDef(task ? task.colorKey : COLOR_PALETTE[0].key); return typeof alpha === 'number' ? `rgba(${hexToRgb(color.solid).join(', ')}, ${alpha})` : color.solid; }
    function colorForTab(tabId, alpha) { const tab = getTab(tabId), color = getColorDef(tab ? tab.colorKey : 'blue'); return typeof alpha === 'number' ? `rgba(${hexToRgb(color.solid).join(', ')}, ${alpha})` : color.solid; }
    function applyTaskRowColor(row, task) { const color = getColorDef(task.colorKey); row.style.background = color.soft; row.style.borderColor = color.mid; }
    function hexToRgb(hex) { const value = hex.replace('#', ''), safe = value.length === 3 ? value.split('').map(ch => ch + ch).join('') : value, num = parseInt(safe, 16); return [(num >> 16) & 255, (num >> 8) & 255, num & 255]; }
    function escapeHtml(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
  </script>
